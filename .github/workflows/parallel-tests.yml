name: Parallel Test Execution

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Matrix strategy for parallel execution
  test-matrix:
    name: Tests - ${{ matrix.test-suite }} - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        test-suite: [api, database, ui-selenium, ui-playwright]
        browser: [chrome, firefox]
        exclude:
          # API and database tests don't need browser variations
          - test-suite: api
            browser: firefox
          - test-suite: database
            browser: firefox
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: test-automation:latest
          load: true
          cache-from: type=gha,scope=${{ matrix.test-suite }}
          cache-to: type=gha,mode=max,scope=${{ matrix.test-suite }}
      
      - name: Set test command
        id: test-cmd
        run: |
          case "${{ matrix.test-suite }}" in
            api)
              echo "cmd=pytest tests/api/ -v -n auto" >> $GITHUB_OUTPUT
              echo "marker=api" >> $GITHUB_OUTPUT
              ;;
            database)
              echo "cmd=pytest tests/database/ -v -n auto" >> $GITHUB_OUTPUT
              echo "marker=database" >> $GITHUB_OUTPUT
              ;;
            ui-selenium)
              echo "cmd=pytest tests/ --ignore=tests/api --ignore=tests/database -v -n auto --driver=selenium" >> $GITHUB_OUTPUT
              echo "marker=ui-selenium" >> $GITHUB_OUTPUT
              ;;
            ui-playwright)
              echo "cmd=pytest tests/ --ignore=tests/api --ignore=tests/database -v -n auto --driver=playwright" >> $GITHUB_OUTPUT
              echo "marker=ui-playwright" >> $GITHUB_OUTPUT
              ;;
          esac
      
      - name: Run tests
        id: run-tests
        continue-on-error: true
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e HEADLESS=true \
            -e BROWSER=${{ matrix.browser }} \
            -e MONGODB_CONNECTION_STRING="mongodb://localhost:27017" \
            -e PARALLEL_WORKERS=4 \
            test-automation:latest \
            ${{ steps.test-cmd.outputs.cmd }} \
            --alluredir=reports/allure-results \
            --html=reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}.html \
            --self-contained-html \
            --json-report \
            --json-report-file=reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}.json
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.test-suite }}-${{ matrix.browser }}
          path: |
            reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}.html
            reports/report-${{ matrix.test-suite }}-${{ matrix.browser }}.json
          if-no-files-found: warn
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.test-suite }}-${{ matrix.browser }}
          path: reports/allure-results/
          if-no-files-found: warn
      
      - name: Upload screenshots
        if: always() && contains(matrix.test-suite, 'ui')
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.test-suite }}-${{ matrix.browser }}
          path: reports/screenshots/
          if-no-files-found: ignore
      
      - name: Check test results
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "❌ Tests failed for ${{ matrix.test-suite }} on ${{ matrix.browser }}"
          exit 1
  
  # Aggregate results
  aggregate-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    
    steps:
      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: reports
      
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
      
      - name: Merge Allure results
        run: |
          mkdir -p allure-results-merged
          find allure-results -type f -name "*.json" -exec cp {} allure-results-merged/ \;
      
      - name: Aggregate test results
        id: aggregate
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0
          
          for file in reports/*/report-*.json; do
            if [ -f "$file" ]; then
              TOTAL=$((TOTAL + $(jq '.summary.total' "$file")))
              PASSED=$((PASSED + $(jq '.summary.passed' "$file")))
              FAILED=$((FAILED + $(jq '.summary.failed' "$file")))
            fi
          done
          
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
      
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-merged
          allure_history: allure-history
          keep_reports: 20
      
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/
      
      - name: Create summary
        run: |
          echo "# 🧪 Parallel Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Overall Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | ${{ steps.aggregate.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ✅ ${{ steps.aggregate.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ❌ ${{ steps.aggregate.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pass Rate | $(echo "scale=2; ${{ steps.aggregate.outputs.passed }} * 100 / ${{ steps.aggregate.outputs.total }}" | bc)% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for file in reports/*/report-*.json; do
            if [ -f "$file" ]; then
              SUITE=$(echo "$file" | sed -n 's/.*report-\(.*\)-\(.*\)\.json/\1/p')
              BROWSER=$(echo "$file" | sed -n 's/.*report-\(.*\)-\(.*\)\.json/\2/p')
              FAILED=$(jq '.summary.failed' "$file")
              STATUS=$([ "$FAILED" -eq 0 ] && echo "✅ Passed" || echo "❌ Failed")
              echo "| $SUITE | $BROWSER | $STATUS |" >> $GITHUB_STEP_SUMMARY
            fi
          done
      
      - name: Check overall status
        if: steps.aggregate.outputs.failed != '0'
        run: |
          echo "❌ Some tests failed in the matrix"
          exit 1
