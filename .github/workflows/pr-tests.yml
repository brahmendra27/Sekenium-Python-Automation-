name: Pull Request Tests

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  # Job 1: API Tests (Fast, no external dependencies)
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: test-automation:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run API tests in Docker
        id: api-tests
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/reports:/app/reports \
            test-automation:latest \
            pytest tests/api/ -v --alluredir=reports/allure-results --html=reports/api-report.html --self-contained-html
      
      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api-report.html
          if-no-files-found: warn
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: reports/allure-results/
          if-no-files-found: warn
      
      - name: Check API test results
        if: steps.api-tests.outcome == 'failure'
        run: |
          echo "❌ API tests failed"
          exit 1

  # Job 2: Database Tests (with MongoDB)
  database-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: test-automation:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Database tests in Docker
        id: db-tests
        continue-on-error: true
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e MONGODB_CONNECTION_STRING="mongodb://localhost:27017" \
            test-automation:latest \
            pytest tests/database/ -v --alluredir=reports/allure-results --html=reports/db-report.html --self-contained-html
      
      - name: Upload Database test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-report
          path: reports/db-report.html
          if-no-files-found: warn
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-allure-results
          path: reports/allure-results/
          if-no-files-found: warn
      
      - name: Check Database test results
        if: steps.db-tests.outcome == 'failure'
        run: |
          echo "❌ Database tests failed"
          exit 1

  # Job 3: UI Tests (Selenium/Playwright)
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: test-automation:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run UI tests in Docker
        id: ui-tests
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/reports:/app/reports \
            -e HEADLESS=true \
            test-automation:latest \
            pytest tests/ -v --ignore=tests/api --ignore=tests/database --alluredir=reports/allure-results --html=reports/ui-report.html --self-contained-html
      
      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: reports/ui-report.html
          if-no-files-found: warn
      
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: reports/screenshots/
          if-no-files-found: ignore
      
      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-traces
          path: reports/traces/
          if-no-files-found: ignore
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-results
          path: reports/allure-results/
          if-no-files-found: warn
      
      - name: Check UI test results
        if: steps.ui-tests.outcome == 'failure'
        run: |
          echo "❌ UI tests failed"
          exit 1

  # Job 4: Generate Allure Report
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, database-tests, ui-tests]
    if: always()
    
    steps:
      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: api-allure-results
          path: allure-results/api
        continue-on-error: true
      
      - name: Download DB Allure results
        uses: actions/download-artifact@v4
        with:
          name: db-allure-results
          path: allure-results/db
        continue-on-error: true
      
      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: ui-allure-results
          path: allure-results/ui
        continue-on-error: true
      
      - name: Merge Allure results
        run: |
          mkdir -p allure-results-merged
          find allure-results -type f -name "*.json" -exec cp {} allure-results-merged/ \;
      
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results-merged
          allure_history: allure-history
          keep_reports: 20
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: warn
      
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: pr-${{ github.event.pull_request.number }}

  # Job 5: Test Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [api-tests, database-tests, ui-tests]
    if: always()
    
    steps:
      - name: Create test summary
        run: |
          echo "# 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Jobs Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Tests | ${{ needs.database-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| UI Tests | ${{ needs.ui-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [API Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Database Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [UI Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }})" >> $GITHUB_STEP_SUMMARY
      
      - name: Check overall status
        if: needs.api-tests.result != 'success' || needs.database-tests.result != 'success' || needs.ui-tests.result != 'success'
        run: |
          echo "❌ Some tests failed. Please check the reports."
          exit 1
